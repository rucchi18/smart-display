<!DOCTYPE html>

<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <style>
        body { background-color: black;
             background-size: cover;
             background-position: center;
             background-attachment: fixed;
             transition: background-image 3.0s ease-in-out;
             color: #ffffff;
              text-shadow: 0px 0px 15px rgba(0,0,0,0.8);
             margin: 0; 
             display: flex;
             justify-content: center; 
             align-items: center; 
             height: 100vh;
             font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        h1 { font-size: 8rem; }
            /* containerの中身を縦並びにする */
.container {
    text-align: center;
}
/* 背景レイヤーの共通設定 */
.bg-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: opacity 3.5s ease-in-out; /* ここで「ぬるっと」具合を調整 */
    z-index: -1; /* 文字の後ろに配置 */
}

/* 文字を背景より前に出すための設定 */
.container {
    position: relative;
    z-index: 10;
    text-align: center;
}
h1 { 
    font-size: 8rem; 
    margin: 0; /* 余計な隙間を消す */
    font-weight: 50;
    position: relative;
    left: -500px;
    top: -500px;
}

#date {
    font-size: 2.7rem; /* 時計より小さめに */
    margin-top: 10px;
    text-shadow: 0px 0px 15px rgba(0,0,0,0.8);
    font-weight: 300; /* 少し細くするとオシャレ */
    position: relative;
    left: -500px;
    top: -520px;
}
#weather-info{
    font-size: 2.7rem; 
    margin-top: 10px;
    text-shadow: 0px 0px 15px rgba(0,0,0,0.8);
    font-weight: 300; /* 少し細くするとオシャレ */
    position: relative;
    left: -150px;
    top: 450px;
    background-color: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 8px;
}
    </style>
</head>
<body style="background-image: url(&quot;1.jpg&quot;);">
    <div id="bg1" class="bg-layer"></div>
    <div id="bg2" class="bg-layer" style="opacity: 0;"></div>

    <div id="weather-info"></div>

  <div class="container">
    <h1 id="clock">
        <span id="h">00</span><span id="dots">:</span><span id="m">00</span>
    </h1>
    <p id="date">0000.00.00 ---</p>
</div>
   <script>
    // 設定
const apiKey = '85baf70dd41eb221490832164fe4dfdb';
const city = 'Chiba'; // 習志野市の場合。'Chiba'などでもOK

async function getWeather() {
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=ja`;
    
    try {
        const response = await fetch(url);
        
        // 1. まずは通信が成功したかチェック
        if (!response.ok) {
            // 401などの場合はここで処理を中断する
            document.getElementById('weather-info').innerText = `エラー: ${response.status} (キー有効化待ちかも)`;
            return; 
        }

        const data = await response.json();
        
        // 2. データが届いている場合のみ temp を読みに行く
        if (data && data.main) {
            const temp = Math.round(data.main.temp);
            const desc = data.weather[0].description;
            document.getElementById('weather-info').innerText = `${temp}°C / ${desc}`;
            const icon = data.weather[0].icon;
            const iconUrl = `https://openweathermap.org/img/wn/${icon}@2x.png`;
            document.getElementById('weather-info').innerHTML = `
    <img src="${iconUrl}" alt="weather icon" style="vertical-align: middle;">
    <span>${temp}°C / ${desc}</span>`;
        }
    } catch (error) {
        console.error("通信に失敗しました", error);
    }
}

// 初回実行と30分ごとの更新
    getWeather();
    setInterval(getWeather, 900000);

        //list of pictures
        const images = ['1.jpg','2.jpg','3.jpg','4.jpg','5.jpg','6.jpg','7.jpg','8.jpg','9.jpg','10.jpg']
        let currentIndex = 0;
        let activelayer = 1;

        function changeBackground() {   //the function of change background image
            const nextindex = (currentIndex + 1 ) % images.length;
            const currentlayer = document.getElementById('bg'+ activelayer);
            const nextlayer = document.getElementById('bg' + (activelayer === 1 ? 2 : 1));
            nextlayer.style.backgroundImage = "url('" + images[currentIndex] + "')";
            nextlayer.style.opacity = 1;
            currentlayer.style.opacity = 0;
            currentIndex = nextindex;
            activelayer = (activelayer === 1 ? 2 : 1);
            document.getElementById('bg1').style.backgroundImage = "url('" + images[0] + "')";
        }
        function updateClock() {    //the function of timer
        const now = new Date();

        const hourSpan = document.getElementById('h');
        const minSpan = document.getElementById('m');
        const dotSpan = document.getElementById('dots');
        const dateElement = document.getElementById('date');
        
        const hours = now.getHours().toString().padStart(2, '0');
        const mins = now.getMinutes().toString().padStart(2, '0');
    
        if (hourSpan) hourSpan.textContent = hours;
        if (minSpan) minSpan.textContent = mins;

       if (dotSpan) {
        // 偶数秒なら見える(1)、奇数秒なら見えない(0)
        dotSpan.style.opacity = (now.getSeconds() % 2 === 0) ? "1" : "0";
    }
       
        const year = now.getFullYear();
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const date = now.getDate().toString().padStart(2, '0');
        const daynames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
        const day = daynames[now.getDay()];
        const datestring = `${year}.${month}.${date} ${day}`;
        document.getElementById('date').textContent = datestring; 
        }
         updateClock();
        changeBackground();
        setInterval(changeBackground, 300000);
        setInterval(updateClock, 1000); update();
    </script>
</body></html>
